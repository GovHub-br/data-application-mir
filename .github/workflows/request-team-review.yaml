name: Request team review

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  request-team-review:
    name: Request review by domain
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Request reviewers from team labels
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const teamByLabel = {
              "team:gces": "oss",
              "team:ipea": "ipea",
              "team:mir": "mir",
              "team:mcid": "mcid",
              "team:minc": "minc",
              "team:oss": "oss",
            };

            const currentLabels = new Set(
              context.payload.pull_request.labels.map((label) => label.name)
            );

            const team_reviewers = [...new Set([...currentLabels]
              .map((label) => teamByLabel[label])
              .filter(Boolean))];

            if (team_reviewers.length === 0) {
              core.info("No team labels found for this PR.");
              return;
            }

            await github.rest.pulls.requestReviewers({
              owner,
              repo,
              pull_number,
              team_reviewers,
            });

            core.info(`Requested review from teams: ${team_reviewers.join(", ")}`);
